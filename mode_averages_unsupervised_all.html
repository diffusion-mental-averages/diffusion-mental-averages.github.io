<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Diffusion Mental Averages - Unsupervised Clustering Mode Averages">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unsupervised Clustering Mode Averages</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Google+Sans|Noto+Sans|Castoro" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./files/css/bootstrap.min.css">
    <link rel="stylesheet" href="./files/css/Highlight-Clean.css">
    <link rel="stylesheet" href="./files/css/styles.css">
    <link href="./files/css/css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="./files/css/mycss.css">

    <style>
        .result-block {
            margin-bottom: 60px;
            padding: 30px;
            background: var(--bg-color-secondary, #f8f9fa);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        [data-theme='dark'] .result-block {
            background: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .back-btn {
            margin-bottom: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">
        <i id="theme-icon" class="fa fa-moon-o"></i>
    </button>

    <div class="container mt-5" style="max-width: 900px;">
        <a href="index.html" class="btn btn-light mybtn back-btn" style="border-radius: 20px; font-size: 1.05rem; padding: 6px 18px; border: 1px solid #ddd;">
            <i class="fa fa-arrow-left"></i> Back to main page
        </a>

        <h2 class="text-center mb-5">Unsupervised Clustering Mode Averages</h2>

        <div class="result-block">
            <h2 class="text-center prompt-heading"><span class="slide-concept">Crane</span></h2>
            <div class="container mt-4"></div>
            <div class="row swiper-row justify-content-center">
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/crane/crane_single.png" class="img-fluid swiper-img">
                    <p class="caption-text">Single Average</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/crane/crane1.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 1</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/crane/crane2.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 2</p>
                </div>
            </div>
        </div>

        <div class="result-block">
            <h2 class="text-center prompt-heading"><span class="slide-concept">Pumpkin</span></h2>
            <div class="container mt-4"></div>
            <div class="row swiper-row justify-content-center">
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/pumpkin/pumpkin_single.png" class="img-fluid swiper-img">
                    <p class="caption-text">Single Average</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/pumpkin/pumpkin1.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 1</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/pumpkin/pumpkin2.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 2</p>
                </div>
            </div>
        </div>

        <div class="result-block">
            <h2 class="text-center prompt-heading"><span class="slide-concept">Fan</span></h2>
            <div class="container mt-4"></div>
            <div class="row swiper-row justify-content-center">
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/fan/fan_single.png" class="img-fluid swiper-img">
                    <p class="caption-text">Single Average</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/fan/fan1.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 1</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/fan/fan2.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 2</p>
                </div>
            </div>
        </div>

        <div class="result-block">
            <h2 class="text-center prompt-heading"><span class="slide-concept">Boat</span></h2>
            <div class="container mt-4"></div>
            <div class="row swiper-row justify-content-center">
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/boat/boat_single.png" class="img-fluid swiper-img">
                    <p class="caption-text">Single Average</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/boat/boat1.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 1</p>
                </div>
                <div class="col-4 swiper-col text-center">
                    <img src="./files/content/mode_clip/boat/boat2.png" class="img-fluid swiper-img">
                    <p class="caption-text">Cluster 2</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon   = document.getElementById('theme-icon');

        function applyTheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            icon.className = dark ? 'fa fa-sun-o' : 'fa fa-moon-o';
        }

        applyTheme(localStorage.getItem('theme') === 'dark');

        toggle.addEventListener('click', () => {
            const dark = document.documentElement.getAttribute('data-theme') !== 'dark';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
            applyTheme(dark);
        });
    </script>
</body>
</html>
